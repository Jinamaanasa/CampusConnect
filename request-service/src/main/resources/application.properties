server.port=8087
spring.application.name=request-service

# PostgreSQL Connection (Docker or Local)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/campusconnect_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:campusconnect}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password123}

# JPA Config: automatically create/update database tables
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Disable Security for API testing
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration
